---
name: Terraform Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/terraform-docs.yml"
      - "modules/**"

permissions: {}

jobs:
  terraform-docs:
    name: Terraform Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        id: harden_runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Terraform Docs
        id: terraform_docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: .terraform-docs.yml

      - name: Check Generated Module READMEs
        id: check_generated_module_readmes
        run: git diff --exit-code -- ':(glob)modules/**/README.md'
